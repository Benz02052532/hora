<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04050f">
<title>HORA · ผังองค์กร</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
</head>
<body class="locked">

<!-- ท้องฟ้าจริง -->
<canvas id="sky"></canvas>

<!-- วงล้อจักรราศี (สร้างด้วย JS) -->
<svg class="zodiac-wheel" id="wheelOuter" viewBox="0 0 1000 1000" aria-hidden="true"></svg>
<svg class="zodiac-wheel reverse" id="wheelInner" viewBox="0 0 1000 1000" aria-hidden="true"></svg>

<!-- ---------- หน้าใส่รหัส ---------- -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-mark">H</div>
    <div class="gate-title" id="gateTitle">HORA</div>
    <div class="gate-sub">กรุณาใส่รหัสผ่านเพื่อเข้าใช้งาน</div>
    <form id="gateForm" autocomplete="off">
      <input type="password" id="gatePass" placeholder="••••••••" autofocus>
      <button type="submit" class="btn btn-gold">เข้าสู่ระบบ</button>
    </form>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<!-- ---------- แอปหลัก ---------- -->
<div class="app" id="app" hidden>

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">H</div>
      <div class="brand-text">
        <div class="brand-name" id="companyName">บริษัทของคุณ</div>
        <div class="brand-sub" id="companyTagline">ผังองค์กร · โหราศาสตร์ไทย</div>
      </div>
    </div>

    <div class="spacer"></div>
    <div class="planet-strip" id="planetStrip"></div>
    <div class="spacer"></div>

    <button class="btn" id="btnAddDept">+ เพิ่มแผนก</button>
    <button class="btn btn-gold" id="btnAddPerson">+ เพิ่มพนักงาน</button>
    <button class="btn btn-ghost btn-sm" id="btnMenu" title="เมนู">⋯</button>
  </header>

  <main class="stage" id="stage"></main>
</div>

<!-- ---------- แถบสถานะ ---------- -->
<div class="statusbar" id="statusbar" hidden>
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">กำลังเชื่อมต่อ…</span>
  <div class="spacer" style="flex:1"></div>
  <span id="skyClock"></span>
</div>

<!-- ---------- ที่วาง modal / toast ---------- -->
<div id="modalRoot"></div>
<div class="toast-wrap" id="toastRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="js/stars.js"></script>
<script src="js/astro.js"></script>
<script src="js/sky.js"></script>
<script src="js/wheel.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
</body>
</html>
